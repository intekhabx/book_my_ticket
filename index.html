<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stellar Seat Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap");
      body {
        font-family: "Outfit", sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
      }
    </style>
  </head>
  <body
    class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900"
  >
    <div
      class="max-w-7xl w-full bg-slate-800/80 backdrop-blur-xl rounded-3xl shadow-2xl p-10 border border-slate-700/50"
    >
      <div class="text-center mb-10">
        <h1
          class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 mb-4 tracking-tight"
        >
          ChaiCode Cinema - Now Showing<br />
          <br />
          <span>
            <button id="logout" class="float-right px-4 py-2 rounded-full bg-red-400 text-white text-xl hover:bg-red-500">Logout</button>
          </span>
          <span class="text-red-400">
            <span class="font-bold ml-16">Dhurandhar The Revenge</span>
          </span>
        </h1>
        <p class="text-slate-400 text-lg">Jassi ko ghar ki yaad kyu nhi aai?</p>
      </div>

      <div class="flex justify-center mb-10">
        <div
          class="bg-slate-900/50 rounded-full px-6 py-3 border border-slate-700 flex gap-8 items-center"
        >
          <div class="flex items-center gap-3">
            <div
              class="w-4 h-4 rounded-full bg-emerald-500 shadow-[0_0_12px_rgba(16,185,129,0.6)]"
            ></div>
            <span class="text-slate-300 font-medium tracking-wide"
              >Available</span
            >
          </div>
          <div class="w-px h-6 bg-slate-700"></div>
          <div class="flex items-center gap-3">
            <div
              class="w-4 h-4 rounded-full bg-rose-500/20 border border-rose-500/50"
            ></div>
            <span class="text-slate-400 font-medium tracking-wide">Booked</span>
          </div>
        </div>
      </div>

      <div class="flex justify-center">
        <div
          class="bg-slate-900/40 p-8 rounded-2xl border border-slate-700/50 shadow-inner"
        >
          <table
            id="tbl"
            class="border-separate border-spacing-4 mx-auto"
          ></table>
        </div>
      </div>
    </div>

    <script>
      // Helper function to refresh access token
      async function refreshAccessToken() {
        try {
          const res = await fetch('/api/auth/refresh-token', {
            method: 'POST',
            credentials: 'include', // Include cookies (refresh token)
            headers: {
              'Content-Type': 'application/json'
            }
          });
          
          if (res.ok) {
            const data = await res.json();
            console.log('Refresh response:', data);
            // Check if data.data exists and has newAccessToken
            if (data.data && data.data.newAccessToken) {
              localStorage.setItem('accessToken', data.data.newAccessToken);
              console.log('Token refreshed successfully');
              return data.data.newAccessToken;
            } else if (data.newAccessToken) {
              localStorage.setItem('accessToken', data.newAccessToken);
              console.log('Token refreshed successfully');
              return data.newAccessToken;
            }
          } else {
            console.error('Refresh failed with status:', res.status);
            // Only logout if refresh token is also expired (after 7 days)
            localStorage.removeItem('accessToken');
            window.location.href = '/login';
          }
          return null;
        } catch (error) {
          console.error('Token refresh failed:', error);
          localStorage.removeItem('accessToken');
          window.location.href = '/login';
          return null;
        }
      }

      // Helper function to make authenticated API calls with auto-refresh
      async function authenticatedFetch(url, options = {}) {
        let token = localStorage.getItem('accessToken');
        
        if (!token) {
          console.error('No token found');
          window.location.href = '/login';
          return null;
        }

        const defaultOptions = {
          credentials: 'include',
          headers: {
            'Authorization': `Bearer ${token}`,
            ...options.headers
          },
          ...options
        };

        let res = await fetch(url, defaultOptions);

        // If token expired (401), refresh and retry once
        if (res.status === 401) {
          console.log('Got 401, attempting token refresh...');
          const newToken = await refreshAccessToken();
          if (!newToken) {
            console.error('Token refresh returned null');
            return res; // Redirect already happened in refreshAccessToken
          }

          // Retry with new token
          defaultOptions.headers['Authorization'] = `Bearer ${newToken}`;
          console.log('Retrying request with new token');
          res = await fetch(url, defaultOptions);
        }

        return res;
      }

      async function run() {
        const tbl = document.getElementById("tbl");
        
        // Get token from localStorage
        const token = localStorage.getItem('accessToken');
        if (!token) {
          console.log('No token found, redirecting to login');
          window.location.href = '/login';
          return;
        }

        // Send token in Authorization header using authenticated fetch
        const res = await authenticatedFetch("/seats");
        
        if (!res || !res.ok) {
          console.error('Failed to load seats:', res?.status);
          // Don't redirect immediately on initial load failure - try once more
          const retryRes = await authenticatedFetch("/seats");
          if (!retryRes || !retryRes.ok) {
            window.location.href = '/login';
            return;
          }
        }

        const resarray = await res.json();
        const j = resarray.sort((a, b) => a.id - b.id);
        let tr;
        for (let i = 0; i < j.length; i++) {
          if (i % 8 === 0) tr = document.createElement("tr");

          const td = document.createElement("td");

          // Base aesthetic classes - added 'relative group' for tooltip positioning
          const baseClasses =
            "w-32 h-32 rounded-2xl text-center align-middle text-2xl font-bold transition-all duration-300 select-none relative group";

          if (j[i].isbooked) {
            td.className = `${baseClasses} bg-rose-500/10 text-rose-500/60 border border-rose-500/20 cursor-not-allowed`;
            td.innerHTML = `
                    <span class="relative z-10">${j[i].id}</span>
                    <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-3 px-4 py-2 bg-slate-900 border border-slate-700 text-sm text-slate-300 rounded-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 whitespace-nowrap shadow-2xl z-50 pointer-events-none font-normal shadow-[0_10px_25px_rgba(0,0,0,0.5)]">
                        Booked by: <span class="font-bold text-white ml-1">${j[i].name}</span>
                        <div class="absolute top-full left-1/2 -translate-x-1/2 -mt-[1px] border-[6px] border-transparent border-t-slate-700"></div>
                        <div class="absolute top-full left-1/2 -translate-x-1/2 -mt-[2px] border-[5px] border-transparent border-t-slate-900"></div>
                    </div>
                `;
          } else {
            td.className = `${baseClasses} bg-emerald-500 text-white border-2 border-emerald-400 shadow-[0_0_20px_rgba(16,185,129,0.3)] cursor-pointer hover:bg-emerald-400 hover:-translate-y-1.5 hover:shadow-[0_10px_25px_rgba(16,185,129,0.5)] active:scale-95 active:shadow-[0_0_10px_rgba(16,185,129,0.3)]`;
            td.innerHTML = `<span class="relative z-10">${j[i].id}</span>`;
          }

          td.addEventListener("click", async function (e) {
            const currentTd = e.currentTarget;
            if (currentTd.classList.contains("cursor-not-allowed")) {
              return; // Seat is already taken
            }

            try {
              const id = j[i].id; // Safe from loop closure
              const name = prompt("Enter your name");
              if (!name) return;

              const res = await authenticatedFetch(`/${id}/${name}`, { 
                method: "PUT"
              });
              const data = await res.json();

              if (data.error) {
                alert("FAILED! Couldn't book! already booked.");
              } else {
                alert("Booked successfully!");
                // Visually transition to booked state upon success
                currentTd.className = `${baseClasses} bg-rose-500/10 text-rose-500/60 border border-rose-500/20 cursor-not-allowed`;
                currentTd.innerHTML = `
                            <span class="relative z-10">${id}</span>
                            <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-3 px-4 py-2 bg-slate-900 border border-slate-700 text-sm text-slate-300 rounded-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 whitespace-nowrap shadow-2xl z-50 pointer-events-none font-normal shadow-[0_10px_25px_rgba(0,0,0,0.5)]">
                                Booked by: <span class="font-bold text-white ml-1">${name}</span>
                                <div class="absolute top-full left-1/2 -translate-x-1/2 -mt-[1px] border-[6px] border-transparent border-t-slate-700"></div>
                                <div class="absolute top-full left-1/2 -translate-x-1/2 -mt-[2px] border-[5px] border-transparent border-t-slate-900"></div>
                            </div>
                        `;
              }
            } catch (ex) {
              alert("error booking " + ex);
            }
          });
          tr.appendChild(td);
          tbl.appendChild(tr);
        }
      }
      run();

      const logout = document.querySelector('#logout');
      logout.addEventListener('click', async()=>{
        try {
          const res = await authenticatedFetch(`/api/auth/logout`, { 
            method: "POST"
          });
          
          if (res.ok) {
            // Clear from localStorage
            localStorage.removeItem('accessToken');
            localStorage.removeItem('refreshToken');
            // Redirect to login
            window.location.href = '/login';
          } else {
            alert('Logout failed');
          }
        } catch (error) {
          alert('Error during logout: ' + error);
        }
      });
    </script>
  </body>
</html>
